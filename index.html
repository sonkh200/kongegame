<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧠 브레인 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0e17; --surface: #1a1828; --card: #232136;
    --accent: #ff6b6b; --accent2: #ffd93d; --accent3: #6bcb77; --accent4: #4d96ff;
    --text: #fffffe; --muted: #a7a9be; --border: rgba(255,255,255,0.08);
    --correct: #6bcb77; --wrong: #ff6b6b; --glow: rgba(255,107,107,0.3);
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  .container { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; }
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
  .screen.active { display: flex; }
  #intro { justify-content: center; padding: 2rem 1.5rem; background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0e17 60%); }
  .logo-emoji { font-size: 5rem; display: block; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .game-title { font-family: 'Jua', cursive; font-size: 2.8rem; background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin-top: 0.5rem; }
  .tagline { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; margin-bottom: 2rem; }
  .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; width: 100%; }
  .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; text-align: center; }
  .stat-num { font-family: 'Jua', cursive; font-size: 1.8rem; color: var(--accent2); }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; width: 100%; margin-bottom: 2rem; }
  .cat-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 1rem 0.75rem; cursor: pointer; text-align: center; transition: all 0.2s; color: var(--text); }
  .cat-btn.selected { border-color: var(--accent2); background: rgba(255,217,61,0.1); transform: scale(1.03); }
  .cat-icon { font-size: 1.8rem; display: block; margin-bottom: 0.3rem; }
  .cat-name { font-size: 0.85rem; font-weight: 700; }
  .cat-count { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .start-btn { width: 100%; padding: 1.1rem; background: linear-gradient(135deg, var(--accent), #ff4757); border: none; border-radius: 16px; color: white; font-family: 'Jua', cursive; font-size: 1.3rem; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 20px var(--glow); transition: all 0.2s; }
  .start-btn:active { transform: scale(0.97); }
  #game { justify-content: flex-start; }
  .game-header { width: 100%; padding: 1rem 1.25rem 0.75rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
  .q-counter { font-family: 'Jua', cursive; font-size: 1rem; color: var(--muted); }
  .score-badge { font-family: 'Jua', cursive; font-size: 1rem; background: var(--card); padding: 0.25rem 0.75rem; border-radius: 20px; color: var(--accent2); border: 1px solid var(--border); }
  .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }
  .timer-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .timer-bar { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .timer-fill { height: 100%; background: var(--accent3); border-radius: 99px; transition: width 1s linear, background 1s; }
  .timer-fill.warn { background: var(--accent2); }
  .timer-fill.danger { background: var(--accent); }
  .timer-num { font-family: 'Jua', cursive; font-size: 0.9rem; min-width: 28px; text-align: right; color: var(--muted); }
  .question-area { width: 100%; padding: 1.5rem 1.25rem 1rem; }
  .q-category-tag { display: inline-block; font-size: 0.75rem; background: rgba(77,150,255,0.15); color: var(--accent4); border: 1px solid rgba(77,150,255,0.3); border-radius: 20px; padding: 0.2rem 0.7rem; margin-bottom: 0.75rem; }
  .question-text { font-size: 1.15rem; font-weight: 700; line-height: 1.6; color: var(--text); }
  .options-area { width: 100%; padding: 0 1.25rem 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .option-btn { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 1rem 1.1rem; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 0.85rem; transition: all 0.15s; color: var(--text); font-size: 1rem; font-family: 'Noto Sans KR', sans-serif; }
  .option-btn:disabled { cursor: default; }
  .option-num { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Jua', cursive; font-size: 0.9rem; flex-shrink: 0; }
  .option-btn.correct { border-color: var(--correct); background: rgba(107,203,119,0.12); }
  .option-btn.correct .option-num { background: var(--correct); border-color: var(--correct); color: #0f0e17; }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(255,107,107,0.1); }
  .option-btn.wrong .option-num { background: var(--wrong); border-color: var(--wrong); color: white; }
  .feedback-bar { width: 100%; padding: 1rem 1.25rem; display: none; flex-direction: column; gap: 0.6rem; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .feedback-bar.correct-fb { background: rgba(107,203,119,0.12); border-top: 2px solid var(--correct); }
  .feedback-bar.wrong-fb { background: rgba(255,107,107,0.1); border-top: 2px solid var(--wrong); }
  .feedback-top { display: flex; align-items: center; gap: 0.5rem; }
  .feedback-title { font-family: 'Jua', cursive; font-size: 1.1rem; }
  .feedback-bar.correct-fb .feedback-title { color: var(--correct); }
  .feedback-bar.wrong-fb .feedback-title { color: var(--wrong); }
  .feedback-explain { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .next-btn { width: 100%; padding: 1rem; background: var(--accent4); border: none; border-radius: 14px; color: white; font-family: 'Jua', cursive; font-size: 1.1rem; cursor: pointer; margin-top: 0.25rem; }
  .next-btn:active { opacity: 0.8; }
  #result { justify-content: center; align-items: center; padding: 2rem 1.5rem; background: radial-gradient(ellipse at center, #1a1030 0%, #0f0e17 60%); }
  .result-emoji { font-size: 5rem; margin-bottom: 1rem; animation: bounce 0.5s ease; }
  @keyframes bounce { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .result-title { font-family: 'Jua', cursive; font-size: 2rem; margin-bottom: 0.25rem; }
  .result-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .grade-badge { font-family: 'Jua', cursive; font-size: 1rem; padding: 0.4rem 1.2rem; border-radius: 20px; margin-bottom: 1.5rem; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(var(--accent2) calc(var(--pct)*1%), var(--card) 0); display: flex; align-items: center; justify-content: center; margin-bottom: 2rem; }
  .score-inner { width: 110px; height: 110px; border-radius: 50%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-big { font-family: 'Jua', cursive; font-size: 2rem; color: var(--accent2); }
  .score-total { font-size: 0.75rem; color: var(--muted); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; width: 100%; margin-bottom: 2rem; }
  .result-stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 0.85rem 0.5rem; text-align: center; }
  .result-stat-num { font-family: 'Jua', cursive; font-size: 1.5rem; }
  .result-stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .rc .result-stat-num { color: var(--correct); }
  .rw .result-stat-num { color: var(--wrong); }
  .rt .result-stat-num { color: var(--accent4); }
  .retry-btn { width: 100%; padding: 1.1rem; background: linear-gradient(135deg, var(--accent), #ff4757); border: none; border-radius: 16px; color: white; font-family: 'Jua', cursive; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 20px var(--glow); margin-bottom: 0.75rem; }
  .retry-btn:active { transform: scale(0.97); }
  .share-btn { width: 100%; padding: 1rem; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; color: var(--text); font-family: 'Jua', cursive; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div id="intro" class="screen active">
    <div style="text-align:center;margin-bottom:2rem;">
      <span class="logo-emoji">🧠</span>
      <div class="game-title">브레인 퀴즈</div>
      <div class="tagline">매번 새로운 랜덤 문제 도전!</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">10</div><div class="stat-label">문제 수</div></div>
      <div class="stat-card"><div class="stat-num">20</div><div class="stat-label">초 / 문제</div></div>
      <div class="stat-card"><div class="stat-num">4지</div><div class="stat-label">선다형</div></div>
    </div>
    <div style="width:100%;margin-bottom:0.75rem;font-family:'Jua',cursive;font-size:0.9rem;color:var(--muted);">카테고리 선택</div>
    <div class="category-grid" id="catGrid"></div>
    <button class="start-btn" onclick="startGame()">게임 시작하기 🚀</button>
  </div>

  <div id="game" class="screen">
    <div class="game-header">
      <div class="progress-row">
        <div class="q-counter" id="qCounter">1 / 10</div>
        <div class="score-badge">⭐ <span id="scoreDisplay">0</span>점</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
      <div class="timer-row">
        <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
        <div class="timer-num" id="timerNum">20</div>
      </div>
    </div>
    <div class="question-area">
      <div class="q-category-tag" id="qCatTag"></div>
      <div class="question-text" id="questionText"></div>
    </div>
    <div class="options-area" id="optionsArea"></div>
    <div class="feedback-bar" id="feedbackBar">
      <div class="feedback-top">
        <span style="font-size:1.4rem" id="feedbackIcon"></span>
        <span class="feedback-title" id="feedbackTitle"></span>
      </div>
      <div class="feedback-explain" id="feedbackExplain"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <div id="result" class="screen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">퀴즈 완료!</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="grade-badge" id="gradeBadge"></div>
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner">
        <div class="score-big" id="finalScore">0</div>
        <div class="score-total">/ 1000점</div>
      </div>
    </div>
    <div class="result-grid">
      <div class="result-stat rc"><div class="result-stat-num" id="correctCount">0</div><div class="result-stat-label">정답</div></div>
      <div class="result-stat rw"><div class="result-stat-num" id="wrongCount">0</div><div class="result-stat-label">오답</div></div>
      <div class="result-stat rt"><div class="result-stat-num" id="avgTime">0s</div><div class="result-stat-label">평균 시간</div></div>
    </div>
    <button class="retry-btn" onclick="retryGame()">다시 도전하기 🔄</button>
    <button class="share-btn" onclick="shareResult()">결과 공유하기 📤</button>
  </div>
</div>

<script>
const Q = {
  "일반상식": [
    {q:"대한민국의 수도는?",o:["서울","부산","대구","인천"],a:0,e:"서울은 조선 시대부터 600년 이상 수도였어요."},
    {q:"태양계에서 가장 큰 행성은?",o:["토성","목성","천왕성","해왕성"],a:1,e:"목성은 지구의 약 1,300배 크기를 가진 태양계 최대 행성이에요."},
    {q:"세계에서 가장 긴 강은?",o:["아마존강","나일강","양쯔강","미시시피강"],a:1,e:"나일강은 약 6,650km로 세계에서 가장 긴 강이에요."},
    {q:"다이아몬드의 주성분은?",o:["규소","탄소","알루미늄","철"],a:1,e:"다이아몬드는 순수한 탄소(C)로 이루어진 가장 단단한 천연 물질이에요."},
    {q:"인체에서 가장 큰 장기는?",o:["간","폐","피부","심장"],a:2,e:"피부는 성인 기준 약 1.5~2m²로 인체에서 가장 큰 장기예요."},
    {q:"빛의 속도는 약 얼마인가요?",o:["초속 30만km","초속 3만km","초속 300km","초속 30km"],a:0,e:"빛은 진공에서 초속 약 299,792km로 이동해요."},
    {q:"세계에서 가장 높은 산은?",o:["K2","에베레스트","칸첸중가","마칼루"],a:1,e:"에베레스트(8,849m)는 세계 최고봉으로 히말라야 산맥에 있어요."},
    {q:"원소 기호 'Au'는 무엇인가요?",o:["은","금","구리","알루미늄"],a:1,e:"Au는 라틴어 Aurum에서 유래한 금의 원소 기호예요."},
    {q:"세계에서 인구가 가장 많은 나라는?",o:["중국","인도","미국","인도네시아"],a:1,e:"2023년 기준 인도가 약 14.3억 명으로 세계 1위가 됐어요."},
    {q:"물의 화학식은?",o:["CO2","H2O","NaCl","O2"],a:1,e:"물은 수소(H) 2개와 산소(O) 1개로 이루어진 H₂O예요."},
    {q:"컴퓨터에서 1GB는 몇 MB인가요?",o:["100MB","512MB","1024MB","2048MB"],a:2,e:"1GB = 1,024MB예요."},
    {q:"피카소의 국적은?",o:["프랑스","이탈리아","스페인","포르투갈"],a:2,e:"파블로 피카소는 스페인 말라가 출신이에요."},
    {q:"올림픽은 몇 년마다 열리나요?",o:["2년","3년","4년","5년"],a:2,e:"하계·동계 올림픽 모두 4년마다 개최돼요."},
    {q:"DNA 이중나선 구조를 발견한 사람은?",o:["아인슈타인","왓슨과 크릭","파스퇴르","다윈"],a:1,e:"1953년 왓슨과 크릭이 DNA 이중나선 구조를 발견해 노벨상을 받았어요."},
    {q:"셰익스피어의 4대 비극이 아닌 것은?",o:["햄릿","맥베스","오셀로","로미오와 줄리엣"],a:3,e:"로미오와 줄리엣은 4대 비극(햄릿·오셀로·맥베스·리어왕)에 포함되지 않아요."}
  ],
  "과학": [
    {q:"중력가속도는 약 얼마인가요?",o:["6.8m/s²","9.8m/s²","12.8m/s²","3.8m/s²"],a:1,e:"지구 표면에서의 중력가속도는 약 9.8m/s²예요."},
    {q:"원자핵을 구성하는 입자는?",o:["전자와 중성자","양성자와 전자","양성자와 중성자","쿼크와 렙톤"],a:2,e:"원자핵은 양성자(+전하)와 중성자(전하없음)로 구성돼요."},
    {q:"주기율표에서 원소를 배열하는 기준은?",o:["원자량","원자번호","전자수","밀도"],a:1,e:"현대 주기율표는 원자번호(양성자 수) 순서로 원소를 배열해요."},
    {q:"소리의 속도가 가장 빠른 매질은?",o:["공기","물","고체","진공"],a:2,e:"소리는 고체 > 액체 > 기체 순으로 빠르게 전달돼요."},
    {q:"태양의 에너지원은?",o:["핵분열","핵융합","화학반응","전자기반응"],a:1,e:"태양은 수소 원자핵이 융합해 헬륨이 되는 핵융합 반응으로 에너지를 만들어요."},
    {q:"pH 7은 무엇을 의미하나요?",o:["강산성","약산성","중성","강알칼리성"],a:2,e:"pH 7은 중성, 7 미만은 산성, 7 초과는 염기성이에요."},
    {q:"빛의 삼원색은?",o:["빨강·노랑·파랑","빨강·초록·파랑","빨강·주황·보라","청록·자홍·노랑"],a:1,e:"빛의 삼원색은 Red·Green·Blue(RGB)예요."},
    {q:"뉴턴의 운동 제1법칙은?",o:["관성의 법칙","가속도의 법칙","작용반작용의 법칙","만유인력의 법칙"],a:0,e:"제1법칙은 관성의 법칙: 외력이 없으면 물체는 현재 운동 상태를 유지해요."},
    {q:"DNA를 구성하는 염기가 아닌 것은?",o:["아데닌","구아닌","우라실","시토신"],a:2,e:"우라실(U)은 RNA의 염기예요. DNA는 아데닌·구아닌·시토신·티민으로 구성돼요."},
    {q:"절대영도는 몇 °C인가요?",o:["-100°C","-173°C","-273°C","-373°C"],a:2,e:"절대영도는 -273.15°C(0K)로 이론적으로 가장 낮은 온도예요."},
    {q:"세포의 에너지 공장이라 불리는 세포소기관은?",o:["핵","리보솜","미토콘드리아","골지체"],a:2,e:"미토콘드리아는 ATP(에너지)를 생산해 '세포의 발전소'라 불려요."},

    {q:"태평양과 대서양을 연결하는 운하는?",o:["수에즈 운하","파나마 운하","킬 운하","코린트 운하"],a:1,e:"파나마 운하는 중앙아메리카 파나마를 가로질러 태평양과 대서양을 연결해요."},
    {q:"우리나라 동쪽 끝 섬은?",o:["제주도","독도","거제도","울릉도"],a:1,e:"독도(동경 131°52')는 대한민국 영토의 최동단에 위치해요."},
    {q:"아마존 열대우림이 주로 위치한 나라는?",o:["콜롬비아","볼리비아","브라질","페루"],a:2,e:"아마존의 약 60%는 브라질 영토에 있으며 지구 산소의 20%를 공급해요."},
    {q:"세계에서 가장 인구가 많은 도시권은?",o:["베이징","상하이","도쿄","뭄바이"],a:2,e:"도쿄 도시권은 약 3,700만 명으로 세계 최대 도시권이에요."},
    {q:"지중해와 홍해를 연결하는 운하는?",o:["파나마 운하","수에즈 운하","킬 운하","코린트 운하"],a:1,e:"수에즈 운하는 이집트에 위치하며 지중해와 홍해(인도양)를 연결해요."}
  ]
};

const CATS = [
  {key:"일반상식",icon:"🌍"},{key:"과학",icon:"🔬"},
  {key:"역사",icon:"🏛️"},{key:"스포츠",icon:"⚽"},
  {key:"음식/문화",icon:"🍜"},{key:"지리",icon:"🗺️"}
];

let selCat="일반상식", questions=[], curQ=0, score=0, correct=0, timer=null, timeLeft=20, totalTime=0, qStart=0, answered=false;
const LABELS=['①','②','③','④'];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function init(){
  const grid=document.getElementById('catGrid');
  CATS.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(c.key===selCat?' selected':'');
    btn.dataset.cat=c.key;
    btn.innerHTML=`<span class="cat-icon">${c.icon}</span><span class="cat-name">${c.key}</span><span class="cat-count">${Q[c.key].length}문제 보유</span>`;
    btn.onclick=()=>{document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selCat=c.key;};
    grid.appendChild(btn);
  });
}

function startGame(){
  questions=shuffle(Q[selCat]).slice(0,10);
  curQ=0;score=0;correct=0;totalTime=0;
  showScreen('game');renderQuestion();
}

function renderQuestion(){
  const q=questions[curQ];answered=false;
  document.getElementById('qCounter').textContent=`${curQ+1} / ${questions.length}`;
  document.getElementById('progressFill').style.width=`${((curQ+1)/questions.length)*100}%`;
  document.getElementById('qCatTag').textContent=selCat;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('scoreDisplay').textContent=score;
  const area=document.getElementById('optionsArea');area.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-num">${LABELS[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>pick(i,btn);
    area.appendChild(btn);
  });
  document.getElementById('feedbackBar').style.display='none';
  document.getElementById('feedbackBar').className='feedback-bar';
  startTimer();qStart=Date.now();
}

function startTimer(){
  clearInterval(timer);timeLeft=20;updateTimer();
  timer=setInterval(()=>{timeLeft--;updateTimer();if(timeLeft<=0){clearInterval(timer);if(!answered)timeUp();}},1000);
}

function updateTimer(){
  const p=(timeLeft/20)*100;
  const f=document.getElementById('timerFill');
  f.style.width=p+'%';
  document.getElementById('timerNum').textContent=timeLeft;
  f.className='timer-fill'+(timeLeft<=5?' danger':timeLeft<=10?' warn':'');
}

function timeUp(){
  answered=true;totalTime+=(Date.now()-qStart)/1000;
  const q=questions[curQ];
  document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('correct');});
  showFb(false,'⏰ 시간 초과!','정답: '+q.o[q.a]+' | '+q.e);
}

function pick(idx,btn){
  if(answered)return;answered=true;clearInterval(timer);
  totalTime+=(Date.now()-qStart)/1000;
  const q=questions[curQ];const ok=idx===q.a;
  document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('correct');});
  if(!ok)btn.classList.add('wrong');
  if(ok){correct++;const bonus=Math.round((timeLeft/20)*50);score+=100+bonus;showFb(true,`정답이에요! 🎊 +${100+bonus}점`,q.e);}
  else{showFb(false,'아쉬워요! ❌','정답: '+q.o[q.a]+' | '+q.e);}
  document.getElementById('scoreDisplay').textContent=score;
}

function showFb(ok,title,explain){
  const fb=document.getElementById('feedbackBar');
  fb.className='feedback-bar '+(ok?'correct-fb':'wrong-fb');
  document.getElementById('feedbackIcon').textContent=ok?'✅':'❌';
  document.getElementById('feedbackTitle').textContent=title;
  document.getElementById('feedbackExplain').textContent=explain;
  document.getElementById('nextBtn').textContent=curQ>=questions.length-1?'결과 보기 🏆':'다음 문제 →';
  fb.style.display='flex';fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQuestion(){
  curQ++;
  if(curQ>=questions.length)showResult();
  else{renderQuestion();window.scrollTo(0,0);}
}

function showResult(){
  showScreen('result');
  const pct=Math.round((correct/questions.length)*100);
  const avgT=Math.round(totalTime/questions.length);
  document.getElementById('scoreCircle').style.setProperty('--pct',pct);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=questions.length-correct;
  document.getElementById('avgTime').textContent=avgT+'s';
  let emoji,title,sub,grade,gbg,gc;
  if(pct>=90){emoji='🏆';title='천재 등장!';sub='완벽에 가까운 점수예요!';grade='🥇 천재';gbg='rgba(255,217,61,0.15)';gc='#ffd93d';}
  else if(pct>=70){emoji='🎉';title='대단해요!';sub='매우 훌륭한 결과예요!';grade='🥈 우등생';gbg='rgba(107,203,119,0.15)';gc='#6bcb77';}
  else if(pct>=50){emoji='👍';title='잘했어요!';sub='조금만 더 연습하면 완벽!';grade='🥉 도전자';gbg='rgba(77,150,255,0.15)';gc='#4d96ff';}
  else{emoji='💪';title='다시 도전!';sub='포기하지 마세요! 파이팅!';grade='📚 공부중';gbg='rgba(167,169,190,0.15)';gc='#a7a9be';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent=sub;
  const gb=document.getElementById('gradeBadge');
  gb.textContent=grade;gb.style.background=gbg;gb.style.color=gc;gb.style.border=`1px solid ${gc}`;
}

function retryGame(){showScreen('intro');}

function shareResult(){
  const text=`🧠 브레인 퀴즈\n📚 ${selCat} | ⭐ ${score}점\n✅ ${correct}/${questions.length} 정답\n\n도전해봐! 👉 https://sonkh200.github.io/kongegame/`;
  if(navigator.share)navigator.share({title:'브레인 퀴즈',text});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('클립보드에 복사됐어요!'));
}

init();
</script>
</body>
</html>
